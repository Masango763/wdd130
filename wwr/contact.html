<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Company">
    <meta name="author" content="Masango Dewheretsoko">
    <title>Contact Us | White Water Rafting Company</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <img src="images/logo.png" alt="White Water Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO (CENTERED BLOCK) -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT GRID (MAP LEFT, FORM RIGHT) -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <img src="images/map.jpg" alt="Map location">
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Placeholder">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Placeholder">

                <p><strong>Message Purpose</strong></p>

                <label>
                    <input type="radio" name="purpose" checked>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Type here"></textarea>

                <label>
                    <input type="checkbox" checked>
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>
        </section>

        <!-- EMPLOYEES SECTION -->
        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee Profile">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <p>Footer Content including Social Media Icons/Links</p>

        <div class="socials">
            <img src="images/facebook.png" alt="Facebook">
            <img src="images/twitter.png" alt="Twitter">
            <img src="images/instagram.png" alt="Instagram">
        </div>

    </footer>

</body>

</html>
