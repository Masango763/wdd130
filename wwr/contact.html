<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Zambezi White Water Rafting for bookings, questions, and adventure trip information.">
    <meta name="author" content="Masango Dewheretsoko">
    <title>Contact Us - Zambezi White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Zambezi White Water Rafting Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>White Water Rafting Company</h1>

        <!-- CONTACT INFO -->
        <section class="contact-info">
            <p>123 Main River Street</p>
            <p>Victoria Falls, Zimbabwe</p>
            <p>+263 77 123 4567</p>
            <p>info@zambezirafting.com</p>
        </section>

        <!-- GRID: MAP + FORM -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe
                  src="https://maps.google.com/maps?q=victoria%20falls&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>

            <!-- FORM -->
            <form>

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Placeholder">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Placeholder">

                <p>Message Purpose</p>

                <input type="radio" id="general" name="purpose">
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose">
                <label for="suggestion">Website Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type here"></textarea>

                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>

                <button type="submit">Get in Touch</button>

            </form>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="John - Senior Rafting Guide">
                    <figcaption>John - Senior Rafting Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Mary - Safety Instructor">
                    <figcaption>Mary - Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Peter - Trip Coordinator">
                    <figcaption>Peter - Trip Coordinator</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 Zambezi White Water Rafting | Masango Dewheretsoko</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
