<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Zambezi White Water Rafting for bookings, questions, and adventure trip information.">
    <meta name="author" content="Masango Dewheretsoko">
    <title>Contact Us - Zambezi White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Zambezi White Water Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <h1>Contact Zambezi White Water Rafting</h1>

        <!-- CONTACT INFO -->
        <section>
            <h2>Contact Information</h2>

            <p><strong>Address:</strong> Victoria Falls, Zimbabwe</p>
            <p><strong>Phone:</strong> +263 777 123 456</p>
            <p><strong>Email:</strong> info@zambezirafting.com</p>

            <iframe src="https://www.google.com/maps?q=Victoria%20Falls,%20Zimbabwe&output=embed"
              height="300" title="Map of Victoria Falls, Zimbabwe">
            </iframe>
        </section>

        <!-- TEAM -->
        <section>
            <h2>Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="John - Senior Rafting Guide">
                <figcaption>John - Senior Rafting Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Mary - Safety Instructor">
                <figcaption>Mary - Safety Instructor</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Peter - Trip Coordinator">
                <figcaption>Peter - Trip Coordinator</figcaption>
            </figure>

            <figure>
                <img src="images/employee4.jpg" alt="Sarah - Customer Support">
                <figcaption>Sarah - Customer Support</figcaption>
            </figure>
        </section>

        <!-- FORM -->
        <section>
            <h2>Send Us a Message</h2>

            <form>

                <!-- NAME -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <!-- EMAIL -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <!-- RADIO BUTTONS -->
                <p>Purpose of Message:</p>

                <input type="radio" id="general" name="purpose" value="general">
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label>

                <!-- MESSAGE -->
                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <!-- CHECKBOX -->
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Please subscribe me to the monthly newsletter</label>

                <!-- SUBMIT -->
                <button type="submit">Send Message to Team</button>

            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <p>© 2026 Zambezi White Water Rafting | Masango Dewheretsoko</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Visit our Facebook page"></a>
            <a href="#"><img src="images/twitter.png" alt="Visit our Twitter page"></a>
            <a href="#"><img src="images/instagram.png" alt="Visit our Instagram page"></a>
        </nav>

    </footer>

</body>

</html>
