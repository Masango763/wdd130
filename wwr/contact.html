<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact Zambezi White Water Rafting for bookings, questions, and adventure trip information.">

    <meta name="author" content="Masango Dewheretsoko">

    <title>Contact Us - Zambezi White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Zambezi White Water Rafting Logo" class="logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- CONTACT INFO -->
        <section>
            <h1>Contact Us</h1>

            <p><strong>Address:</strong> Victoria Falls, Zimbabwe</p>
            <p><strong>Phone:</strong> +263 777 123 456</p>
            <p><strong>Email:</strong> info@zambezirafting.com</p>

            <!-- GOOGLE MAP -->
            <iframe src="https://www.google.com/maps?q=Victoria%20Falls,%20Zimbabwe&output=embed"
              width="100%" height="300" loading="lazy">
            </iframe>
        </section>

        <!-- EMPLOYEES -->
        <section>
            <h2>Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Rafting guide John">
                <figcaption>John - Senior Rafting Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Instructor Mary">
                <figcaption>Mary - Safety Instructor</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Coordinator Peter">
                <figcaption>Peter - Trip Coordinator</figcaption>
            </figure>
        </section>

        <!-- CONTACT FORM -->
        <section>
            <h2>Send Us a Message</h2>

            <form>

                <!-- NAME -->
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <!-- EMAIL -->
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <!-- PURPOSE -->
                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <!-- MESSAGE -->
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <!-- NEWSLETTER -->
                <label>
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Send Message to Rafting Team</button>

            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Zambezi White Water Rafting | Masango Dewheretsoko</p>
    </footer>

</body>

</html>
